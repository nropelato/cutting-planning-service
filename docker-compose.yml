services:
  cutting-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cutting-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override any .env values here for compose-specific defaults
      WORKERS: 2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
